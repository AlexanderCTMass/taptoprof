<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TapToProfi — Голосовая заявка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #181B20;
            background: #F9FAFB;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .chat-message {
            animation: fadeSlideUp 0.3s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 24px;
            text-align: left;
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }

        .tap-active:active {
            transform: scale(0.97);
            transition: transform 0.05s ease;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* === FIXED MOBILE LAYOUT: header + bottom nav fixed, main scrollable === */
        @media (max-width: 1023px) {
            /* Make main container a column flex with fixed header and bottom nav */
            .mobile-fixed-layout {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            /* Fixed header stays at top */
            .mobile-header-fixed {
                position: sticky;
                top: 0;
                z-index: 50;
                flex-shrink: 0;
                background-color: #F9FAFB;
            }

            /* Scrollable content area */
            .mobile-scrollable-content {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }

            /* Fixed bottom navigation */
            .mobile-bottom-fixed {
                flex-shrink: 0;
                position: sticky;
                bottom: 0;
                z-index: 50;
                background-color: white;
            }

            /* Remove default sticky from header on mobile to avoid double sticky */
            header.lg\\:hidden {
                position: relative;
            }
        }

        /* Ensure desktop layout remains unchanged */
        @media (min-width: 1024px) {
            .mobile-fixed-layout {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            .mobile-scrollable-content {
                flex: 1;
                overflow-y: auto;
            }

            .mobile-header-fixed, .mobile-bottom-fixed {
                position: relative;
            }
        }
    </style>
</head>

<script>
    (function () {
        const chatContainer = document.getElementById('chatMessages');
        const startBtn = document.getElementById('startVoiceBtn');

        // Состояние заявки
        let orderData = {
            photo: 'assets/photo.JPG',
            problemDesc: '',
            timePreference: null,
            address: 'Москва, ул. Зорге, д. 1'
        };

        let currentStep = 'initial'; // initial, waitingProblem, waitingTime, ready

        // Утилиты: добавление сообщения в чат
        function addMessage(role, content, isHtml = false, isFullWidth = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubbleClass = role === 'user' ? 'bg-blue-600 text-white rounded-2xl rounded-br-md' : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-bl-md';
            messageDiv.innerHTML = `
          <div class="max-w-[${isFullWidth ? "100%" : "85%"}] ${bubbleClass} px-4 py-3 shadow-sm">
            ${isHtml ? content : `<div class="text-sm">${content}</div>`}
          </div>
        `;
            chatContainer.appendChild(messageDiv);
            messageDiv.scrollIntoView({behavior: 'smooth', block: 'end'});
            return messageDiv;
        }

        function addLoaderMessage(role, loaderText) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubbleClass = role === 'user' ? 'bg-blue-600 text-white rounded-2xl' : 'bg-white border border-gray-200 text-gray-800 rounded-2xl';
            messageDiv.innerHTML = `
          <div class="max-w-[85%] ${bubbleClass} px-4 py-3 shadow-sm">
            <div class="flex items-center gap-2 text-sm">
              <iconify-icon icon="lucide:loader-2" width="18" class="animate-spin"></iconify-icon>
              <span>${loaderText}</span>
            </div>
          </div>
        `;
            chatContainer.appendChild(messageDiv);
            messageDiv.scrollIntoView({behavior: 'smooth', block: 'end'});
            return messageDiv;
        }

        function replaceInitialBlockWithChat() {
            const initialBlock = document.getElementById('initialVoiceBlock');
            if (initialBlock) initialBlock.remove();
        }

        // Имитация распознавания голоса
        function simulateVoiceRecognition(callback) {
            const demoProblem = "Протекает кран в санузле, постоянно капает вода, нужна срочная замена сифона";
            setTimeout(() => {
                callback(demoProblem);
            }, 1800);
        }

        // Основной сценарий после нажатия кнопки
        startBtn.addEventListener('click', () => {
            if (currentStep !== 'initial') return;
            replaceInitialBlockWithChat();

            // 1. Добавляем сообщение "Обработка записи..." (лоадер)
            const processingLoader = addLoaderMessage('bot', 'Обработка записи');
            setTimeout(() => {
                processingLoader.remove();
                // 2. Добавляем распознанное сообщение от пользователя
                const recognizedText = "Протекает кран в санузле, постоянно капает вода, нужна срочная замена сифона";
                orderData.problemDesc = recognizedText;
                addMessage('user', recognizedText);

                // 3. Лоадер "Бот думает"
                const botThinkingLoader = addLoaderMessage('bot', 'Бот думает');
                setTimeout(() => {
                    botThinkingLoader.remove();
                    // 4. Сообщение бота + кнопки выбора времени
                    addMessage('bot', 'Уточните пожалуйста когда сможете принять специалиста?');

                    // Добавляем блок с кнопками (микрофон + две вспомогательные)
                    const actionDiv = document.createElement('div');
                    actionDiv.className = 'chat-message flex justify-start';
                    actionDiv.innerHTML = `
              <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-md p-4 shadow-sm max-w-[85%] space-y-3">
                <div class="flex flex-wrap gap-2">
                  <button class="timeQuickBtn tap-active bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full text-sm font-medium">⏱ Как можно скорее</button>
                  <button class="timeQuickBtn tap-active bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full text-sm font-medium">🕒 В любое время</button>
                </div>
                <div class="border-t pt-2 mt-1">
                  <button id="micInlineBtn" class="flex items-center gap-2 text-blue-600 font-medium tap-active">
                    <iconify-icon icon="lucide:mic" width="20"></iconify-icon>
                    <span class="text-sm">Записать голосом</span>
                  </button>
                </div>
              </div>
            `;
                    chatContainer.appendChild(actionDiv);
                    actionDiv.scrollIntoView({behavior: 'smooth', block: 'end'});

                    // Обработчики для быстрых кнопок
                    document.querySelectorAll('.timeQuickBtn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const chosen = btn.innerText.includes('скорее') ? 'как можно скорее' : 'в любое время';
                            orderData.timePreference = chosen;
                            // удаляем блок кнопок
                            actionDiv.remove();
                            // добавляем сообщение пользователя
                            addMessage('user', chosen);
                            // лоадер после выбора
                            const finalLoader = addLoaderMessage('bot', 'Формирую данные заявки');
                            setTimeout(() => {
                                finalLoader.remove();
                                // финальный блок с таблицей и кнопками
                                showFinalSummary();
                            }, 2000);
                        });
                    });

                    // микрофон в этом блоке (имитация голосового выбора)
                    const micInline = document.getElementById('micInlineBtn');
                    if (micInline) {
                        micInline.addEventListener('click', () => {
                            // имитация записи голоса для времени
                            micInline.disabled = true;
                            micInline.innerHTML = '<iconify-icon icon="lucide:loader-2" width="20" class="animate-spin"></iconify-icon><span>Слушаю...</span>';
                            setTimeout(() => {
                                const mockTimeAnswer = "Могу принять специалиста завтра в первой половине дня";
                                orderData.timePreference = mockTimeAnswer;
                                actionDiv.remove();
                                addMessage('user', mockTimeAnswer);
                                const loaderAfterVoice = addLoaderMessage('bot', 'Обрабатываю ответ');
                                setTimeout(() => {
                                    loaderAfterVoice.remove();
                                    showFinalSummary();
                                }, 1800);
                            }, 1500);
                        });
                    }

                    currentStep = 'waitingTime';
                }, 2000);
            }, 2000);
            currentStep = 'waitingProblem';
        });

        function showFinalSummary() {
            // Таблица с данными
            const summaryHtml = `
          <div class="bg-gray-50 rounded-xl p-4 space-y-2 text-sm">
            <div class="font-bold mb-4">📋 Данные заявки</div>
            <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Фото:</span><span class="font-medium"><img src="${orderData.photo}" alt="Фото объекта" class="w-16 h-16 rounded-lg object-cover border border-gray-200 shadow-sm"></span></div>
            <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Описание:</span><span class="font-medium">${orderData.problemDesc.substring(0, 70)}${orderData.problemDesc.length > 70 ? '…' : ''}</span></div>
            <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Время визита:</span><span class="font-medium">${orderData.timePreference}</span></div>
            <div class="grid grid-cols-2 gap-2"><span class="text-gray-500">Адрес:</span><span class="font-medium">${orderData.address}</span></div>
          </div>
        `;
            addMessage('bot', summaryHtml, true, true);

            // Добавляем блок с микрофоном и кнопкой отправки
            const actionFooter = document.createElement('div');
            actionFooter.className = 'chat-message flex justify-start';
            actionFooter.innerHTML = `
          <div class="bg-white border border-gray-200 rounded-2xl rounded-bl-md p-4 shadow-sm w-full max-w-[100%]">
            <div class="flex flex-col sm:flex-row gap-3 items-center justify-between">
              <button id="finalMicBtn" class="flex items-center gap-2 text-blue-600 font-medium tap-active px-4 py-2 rounded-full bg-blue-50">
                <iconify-icon icon="lucide:mic" width="22"></iconify-icon>
                <span>Записать уточнение</span>
              </button>
              <button id="submitOrderBtn" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 px-8 rounded-xl shadow-md tap-active flex items-center gap-2">
                <iconify-icon icon="lucide:send" width="20"></iconify-icon>
                Отправить заявку
              </button>
            </div>
            <p class="text-xs text-gray-400 mt-3 text-center">Проверьте данные перед отправкой</p>
          </div>
        `;
            chatContainer.appendChild(actionFooter);
            actionFooter.scrollIntoView({behavior: 'smooth', block: 'end'});

            // Обработка микрофона в финале (имитация)
            const finalMic = document.getElementById('finalMicBtn');
            if (finalMic) {
                finalMic.addEventListener('click', () => {
                    finalMic.disabled = true;
                    finalMic.innerHTML = '<iconify-icon icon="lucide:loader-2" width="22" class="animate-spin"></iconify-icon><span>Слушаю...</span>';
                    setTimeout(() => {
                        finalMic.innerHTML = '<iconify-icon icon="lucide:mic" width="22"></iconify-icon><span>Записать уточнение</span>';
                        finalMic.disabled = false;
                        addMessage('user', 'Дополнительно: подъезд 3, код домофона 123');
                        const thanksLoader = addLoaderMessage('bot', 'Обновляю данные');
                        setTimeout(() => {
                            thanksLoader.remove();
                            addMessage('bot', '✅ Дополнение принято. Вся информация сохранена.');
                            // обновляем таблицу (опционально) - просто добавляем новое сообщение с обновлёнными данными
                            const updatedHtml = `
                  <div class="bg-gray-50 rounded-xl p-4 space-y-2 text-sm">
                    <div class="font-bold mb-2">📋 Обновлённые данные заявки</div>
                    <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Фото:</span><span>✅ добавлено</span></div>
                    <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Описание:</span><span class="font-medium">${orderData.problemDesc.substring(0, 70)}…</span></div>
                    <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Время визита:</span><span class="font-medium">${orderData.timePreference}</span></div>
                    <div class="grid grid-cols-2 gap-2"><span class="text-gray-500">Доп. инфо:</span><span class="font-medium">подъезд 3, код 123</span></div>
                  </div>
                `;
                            addMessage('bot', updatedHtml, true);
                        }, 1500);
                    }, 1600);
                });
            }

            // Кнопка отправки заявки
            const submitBtn = document.getElementById('submitOrderBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    addMessage('user', '📨 Отправить заявку');
                    const sendingLoader = addLoaderMessage('bot', 'Отправка заявки');
                    setTimeout(() => {
                        sendingLoader.remove();
                        addMessage('bot', '✅ Заявка успешно создана! Номер #TP-2412. Специалист свяжется в ближайшее время.');
                        // деактивируем кнопки отправки
                        if (submitBtn) submitBtn.disabled = true;
                        if (finalMic) finalMic.disabled = true;
                        submitBtn.classList.add('opacity-50');

                        // ✅ РЕДИРЕКТ НА request.html ЧЕРЕЗ 2 СЕКУНДЫ
                        setTimeout(() => {
                            window.location.href = '../match/index.html';
                        }, 2000);
                    }, 1800);
                });
            }

            currentStep = 'ready';
        }
    })();
</script>
</body>
</html>
