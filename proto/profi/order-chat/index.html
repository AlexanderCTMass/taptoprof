<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TapToProfi — Чат заказа (Аукцион)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * {
      transition: all 0.2s ease;
    }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0f172a;
    }
    .bg-soft-glow {
      background: radial-gradient(circle at center, rgba(37, 99, 235, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
    }
    .tap-active:active {
      transform: scale(0.96);
      filter: brightness(0.95);
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .shadow-message {
      box-shadow: 0 1px 2px 0px rgba(0, 0, 0, 0.05);
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(243, 244, 246, 0.4);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .text-metadata {
      font-size: 11px;
      font-weight: 500;
      color: #8F96A3;
    }
    * {
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes pulseGlow {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }
    .recording-pulse {
      animation: pulseGlow 0.8s infinite alternate;
    }
    /* FIXED MOBILE LAYOUT: header + bottom nav fixed, main scrollable */
    .mobile-fixed-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .mobile-scrollable-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .mobile-header-fixed {
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
      background-color: #F9FAFB;
    }
    .mobile-bottom-fixed {
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      z-index: 50;
      background-color: white;
    }
    /* Desktop adjustments */
    @media (min-width: 1024px) {
      .mobile-fixed-layout {
        height: 100vh;
      }
      .mobile-header-fixed {
        position: relative;
      }
      .mobile-bottom-fixed {
        position: relative;
      }
    }
  </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen flex flex-col lg:flex-row"  id="scrollableContainer">

<!-- Desktop Sidebar -->
<aside class="hidden lg:flex flex-col w-72 bg-white border-r border-gray-100 h-screen sticky top-0">
  <div class="p-6 border-b border-gray-50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 flex items-center justify-center border border-[#181B20] rounded-[5px]">
        <svg class="w-[18px] h-[18px] text-[#181B20]" viewBox="0 0 18 18"><path d="M13.3511 1.00426C13.6035 0.979434 13.8584 1.01916 14.0913 1.11949L14.2056 1.17516L14.315 1.23961C14.5276 1.37773 14.7014 1.56768 14.8208 1.79137L14.8765 1.90563L14.9214 2.02477C15.0012 2.26511 15.0193 2.52186 14.9732 2.77086L14.9439 2.89488C14.9403 2.90782 14.9372 2.92116 14.9331 2.93395L13.0132 8.95348L12.9966 9.00035H20C20.377 8.99962 20.7472 9.10533 21.0669 9.30602C21.3874 9.50722 21.6438 9.79572 21.8072 10.1371C21.9705 10.4784 22.0342 10.8589 21.9898 11.2347C21.9509 11.5635 21.8311 11.8768 21.6421 12.1468L21.5562 12.2601L21.4976 12.3265L11.5972 22.5267L11.5962 22.5257C11.3775 22.7596 11.0908 22.9195 10.7749 22.9779C10.4404 23.0398 10.0945 22.986 9.79446 22.8255C9.49446 22.6651 9.25781 22.4067 9.12356 22.0941C8.98947 21.7816 8.96599 21.4328 9.05618 21.1048L9.06692 21.0658L10.9868 15.0463L11.0034 15.0004H4C3.62242 14.9999 3.25259 14.8942 2.93313 14.6937C2.61282 14.4926 2.35623 14.2048 2.1929 13.8636C2.02953 13.5222 1.96587 13.1409 2.01028 12.765C2.05474 12.3893 2.2055 12.0334 2.44388 11.7396L2.50247 11.6732L12.4029 1.47399C12.6216 1.23994 12.9092 1.08127 13.2251 1.02281L13.3511 1.00426ZM4.00247 13.0004H11C11.3221 12.9998 11.6401 13.0771 11.9263 13.2259C12.2132 13.3752 12.4602 13.5914 12.645 13.8568C12.8299 14.1223 12.9474 14.4294 12.9878 14.7504C13.0261 15.055 12.9904 15.363 12.8902 15.6527L12.8931 15.6537L11.6265 19.6244L19.9976 11.0004H13C12.6774 11.0008 12.3596 10.9244 12.0738 10.7758C11.7868 10.6265 11.5399 10.4094 11.355 10.1439C11.1703 9.87856 11.0527 9.57215 11.0122 9.25135C10.9738 8.94633 11.0084 8.63714 11.1089 8.34706L11.107 8.34706L12.3726 4.37438L4.00247 13.0004Z" fill="currentColor"/></svg>
      </div>
      <span class="text-[18px] font-bold tracking-tight">TapToProfi</span>
    </div>
  </div>
  <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
    <div class="px-3 py-2 text-xs font-semibold text-gray-400">Меню</div>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-blue-50 text-blue-600 rounded-lg font-medium"><iconify-icon icon="lucide:plus-circle" width="20"></iconify-icon>Новая запись</a>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg"><iconify-icon icon="lucide:history" width="20"></iconify-icon>История</a>
    <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg"><iconify-icon icon="lucide:folder" width="20"></iconify-icon>Проекты</a>
  </nav>
  <div class="p-4 border-t border-gray-50"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden"><img src="../IMG_1.webp" class="w-full h-full object-cover"></div><div><p class="text-sm font-semibold">Алексей</p><p class="text-xs text-gray-500">Pro Account</p></div></div></div>
</aside>

<!-- Mobile Header (fixed) -->
<div class="mobile-header-fixed">
  <header class="lg:hidden flex flex-col w-full bg-[#F9FAFB]">
    <div class="h-[53px] flex items-center px-4 border-b border-[#f3f4f6]">
      <div class="flex items-center gap-3 justify-between w-full">
        <div class="flex items-center gap-3">
          <div class="w-[30px] h-[30px] flex items-center justify-center border border-[#181B20] rounded-[5px]"><svg width="18" height="18" viewBox="0 0 18 18"><path d="M13.3511 1.00426C13.6035 0.979434 13.8584 1.01916 14.0913 1.11949L14.2056 1.17516L14.315 1.23961C14.5276 1.37773 14.7014 1.56768 14.8208 1.79137L14.8765 1.90563L14.9214 2.02477C15.0012 2.26511 15.0193 2.52186 14.9732 2.77086L14.9439 2.89488C14.9403 2.90782 14.9372 2.92116 14.9331 2.93395L13.0132 8.95348L12.9966 9.00035H20C20.377 8.99962 20.7472 9.10533 21.0669 9.30602C21.3874 9.50722 21.6438 9.79572 21.8072 10.1371C21.9705 10.4784 22.0342 10.8589 21.9898 11.2347C21.9509 11.5635 21.8311 11.8768 21.6421 12.1468L21.5562 12.2601L21.4976 12.3265L11.5972 22.5267L11.5962 22.5257C11.3775 22.7596 11.0908 22.9195 10.7749 22.9779C10.4404 23.0398 10.0945 22.986 9.79446 22.8255C9.49446 22.6651 9.25781 22.4067 9.12356 22.0941C8.98947 21.7816 8.96599 21.4328 9.05618 21.1048L9.06692 21.0658L10.9868 15.0463L11.0034 15.0004H4C3.62242 14.9999 3.25259 14.8942 2.93313 14.6937C2.61282 14.4926 2.35623 14.2048 2.1929 13.8636C2.02953 13.5222 1.96587 13.1409 2.01028 12.765C2.05474 12.3893 2.2055 12.0334 2.44388 11.7396L2.50247 11.6732L12.4029 1.47399C12.6216 1.23994 12.9092 1.08127 13.2251 1.02281L13.3511 1.00426ZM4.00247 13.0004H11C11.3221 12.9998 11.6401 13.0771 11.9263 13.2259C12.2132 13.3752 12.4602 13.5914 12.645 13.8568C12.8299 14.1223 12.9474 14.4294 12.9878 14.7504C13.0261 15.055 12.9904 15.363 12.8902 15.6527L12.8931 15.6537L11.6265 19.6244L19.9976 11.0004H13C12.6774 11.0008 12.3596 10.9244 12.0738 10.7758C11.7868 10.6265 11.5399 10.4094 11.355 10.1439C11.1703 9.87856 11.0527 9.57215 11.0122 9.25135C10.9738 8.94633 11.0084 8.63714 11.1089 8.34706L11.107 8.34706L12.3726 4.37438L4.00247 13.0004Z" fill="black"/></svg></div>
          <span class="text-[18px] font-bold">TapToProfi</span>
        </div>
        <div class="flex items-center gap-2"><div class="w-10 h-10 rounded-full bg-gray-200 overflow-hidden"><img src="../IMG_1.webp" class="w-full h-full object-cover"></div><div><p class="text-sm font-semibold">Алексей</p><p class="text-xs text-gray-500">Pro</p></div></div>
      </div>
    </div>
  </header>
</div>

<div class="flex-1 flex flex-col h-screen relative mobile-fixed-layout">
  <div class="mobile-scrollable-content" id="scrollableChatContainer">
    <div class="flex-1 flex flex-col relative max-w-[1200px] mx-auto w-full bg-white lg:shadow-xl">
      <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 lg:py-4">
        <div class="flex items-center justify-between mt-2 lg:mt-0">
          <div class="flex items-center gap-3"><button class="p-2 hover:bg-gray-100 rounded-full"><svg class="w-6 h-6" viewBox="0 0 24 24"><path d="M14.293 5.29295C14.6835 4.90243 15.3165 4.90243 15.707 5.29295C16.0976 5.68348 16.0976 6.31649 15.707 6.70702L10.4141 12L15.707 17.293L15.7754 17.3691C16.0957 17.7619 16.0731 18.3409 15.707 18.707C15.3409 19.0731 14.7619 19.0957 14.3691 18.7754L14.293 18.707L8.29297 12.707C7.90245 12.3165 7.90245 11.6835 8.29297 11.293L14.293 5.29295Z" fill="currentColor"/></svg></button><h2 class="text-[18px] font-semibold">Ремонт крана</h2></div>
          <div class="w-9 h-9 rounded-full overflow-hidden"><img src="../IMG_2.png" class="w-full h-full object-cover"></div>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto px-4 py-6 space-y-8 no-scrollbar" id="chatMessagesContainer">
        <!-- Динамические сообщения будут добавлены сюда -->
      </main>
    </div>
  </div>
</div>

<!-- Mobile Bottom Navigation (fixed) -->
<div class="mobile-bottom-fixed">
  <nav class="lg:hidden flex justify-around items-center h-16 bg-white border-t border-gray-100 safe-area-bottom">
    <button class="flex flex-col items-center gap-1 text-blue-600"><iconify-icon icon="ri:home-fill" width="24"></iconify-icon><span class="text-[10px] font-medium">Главная</span></button>
    <button class="flex flex-col items-center gap-1 text-gray-400"><iconify-icon icon="ri:history-line" width="24"></iconify-icon><span class="text-[10px] font-medium">История</span></button>
    <button class="flex flex-col items-center gap-1 text-gray-400"><iconify-icon icon="ri:user-line" width="24"></iconify-icon><span class="text-[10px] font-medium">Профиль</span></button>
  </nav>
</div>

<aside class="hidden xl:flex flex-col w-80 bg-white border-l border-gray-200 h-screen sticky top-0 p-6">
  <h3 class="text-lg font-bold mb-4">Детали заказа</h3>
  <div class="space-y-4"><div class="p-4 bg-gray-50 rounded-xl"><p class="text-xs text-gray-400 font-bold">Адрес</p><p class="text-sm font-medium">Москва, ул. Зорге, д. 1</p></div><div class="p-4 bg-gray-50 rounded-xl"><p class="text-xs text-gray-400 font-bold">Описание</p><p class="text-sm">Течет кран на кухне, нужно заменить прокладки или весь смеситель.</p></div><div class="p-4 bg-blue-50 rounded-xl"><p class="text-xs text-blue-400 font-bold">Статус</p><p class="text-sm font-semibold text-blue-700">Сбор предложений</p></div></div>
  <div class="mt-auto pt-6"><button class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-semibold">Отменить заказ</button></div>
</aside>

<script>
  const chatContainer = document.getElementById('chatMessagesContainer');
  const scrollableContainer = document.getElementById('scrollableChatContainer');
  let currentSpecialistsAdded = false;

  const orderData = {
    photo: 'photo.JPG',
    problemDesc: 'Течет кран на кухне, нужно заменить прокладки или весь смеситель, клиент просил ремкомплект',
    timePreference: 'сегодня после 16:00',
    address: 'Москва, ул. Зорге, д. 1'
  };

  function scrollToBottom() {
    const container = document.getElementById('scrollableChatContainer');
    if (!container) return;

    // На мобильных устройствах нужно больше времени и несколько попыток
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      // Мобильная версия - принудительная прокрутка без smooth
      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 50);

      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 150);

      setTimeout(() => {
        container.scrollTop = container.scrollHeight;
      }, 300);
    } else {
      // Десктопная версия с плавной прокруткой
      requestAnimationFrame(() => {
        container.scrollTo({
          top: container.scrollHeight,
          behavior: 'smooth'
        });
      });
    }
  }

  function addMessage(role, text, timeExtra = null, extraHtml = null) {
    const messageDiv = document.createElement('div');
    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    const sender = role === 'bot' ? 'Бот-ассистент' : 'Специалист (Вы)';
    const avatarColor = role === 'bot' ? 'bg-blue-50' : 'bg-gray-100';
    const iconHtml = role === 'bot' ? '<svg class="w-4 h-4 text-blue-600" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="currentColor"/></svg>' : '<svg class="w-4 h-4 text-gray-600" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>';

    messageDiv.className = `flex gap-3 max-w-[90%] lg:max-w-[70%] mb-6`;
    messageDiv.innerHTML = `
      <div class="flex-shrink-0 mt-auto"><div class="w-8 h-8 ${avatarColor} rounded-full flex items-center justify-center">${iconHtml}</div></div>
      <div class="space-y-1 flex-1"><p class="text-metadata ml-1">${sender} • ${timeExtra || timeStr}</p><div class="bg-[#F9FAFB] border border-gray-100 p-4 rounded-2xl rounded-bl-md shadow-message">${extraHtml ? extraHtml : `<p class="text-[14px] leading-[23px]">${text}</p>`}</div></div>
    `;
    chatContainer.appendChild(messageDiv);

    // Сразу после добавления вызываем прокрутку
    setTimeout(() => {
      scrollToBottom();
    }, 10);
  }

  function addOrderInfoBlock() {
    const blockDiv = document.createElement('div');
    blockDiv.className = 'bg-gray-50 rounded-xl p-4 space-y-2 text-sm mb-6 border border-gray-100 shadow-sm';
    blockDiv.innerHTML = `
      <div class="font-bold mb-2 text-blue-800">📋 Данные заявки #TP-2412</div>
      <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Фото:</span><span class="font-medium"><img src="${orderData.photo}" alt="Фото" class="w-16 h-16 rounded-lg object-cover border border-gray-200 shadow-sm" onerror="this.src='https://via.placeholder.com/64'"></span></div>
      <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Описание:</span><span class="font-medium">${orderData.problemDesc.substring(0, 80)}${orderData.problemDesc.length > 80 ? '…' : ''}</span></div>
      <div class="grid grid-cols-2 gap-2 border-b pb-2"><span class="text-gray-500">Время визита:</span><span class="font-medium">${orderData.timePreference}</span></div>
      <div class="grid grid-cols-2 gap-2"><span class="text-gray-500">Адрес:</span><span class="font-medium">${orderData.address}</span></div>
    `;
    chatContainer.appendChild(blockDiv);
    scrollToBottom();
  }

  function addVoiceButton() {
    const btnDiv = document.createElement('div');
    btnDiv.className = 'flex justify-start mt-2 mb-6';
    btnDiv.innerHTML = `<button id="voiceActionBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-md flex items-center gap-2 transition-all"><iconify-icon icon="mdi:microphone" width="18"></iconify-icon>🎙️ Озвучить данные</button>`;
    chatContainer.appendChild(btnDiv);
    scrollToBottom();
    document.getElementById('voiceActionBtn')?.addEventListener('click', simulateVoiceRecording);
  }

  function simulateVoiceRecording() {
    const voiceBtn = document.getElementById('voiceActionBtn');
    if(voiceBtn) voiceBtn.disabled = true;
    addMessage('user', 'Слушаю...', null, `<div class="flex items-center gap-2"><span class="recording-pulse inline-block w-3 h-3 bg-red-500 rounded-full"></span><span class="text-sm">Запись... 0:02</span></div>`);
    setTimeout(() => {
      const transcribedText = 'Добрый день, могу подъехать сегодня после обеда, цена за работу с учётом ремкомплекта — 450 рублей.';
      addMessage('user', transcribedText);
      setTimeout(() => {
        addMessage('bot', '🤔 Думаю...');
        setTimeout(() => {
          addMessage('bot', 'Спасибо! Ваша ставка принята. Ожидайте поступления других предложений от специалистов.');
          if(!currentSpecialistsAdded) addSpecialistsWithDelay();
        }, 1500);
      }, 800);
    }, 1800);
  }

  function addSpecialistsWithDelay() {
    const specialists = [
      { name: 'Иван С.', rating: '5.0', price: 500, text: 'Готов выехать через час. Инструменты и базовые запчасти всегда с собой. Опыт работы более 10 лет.', avatar: 'https://randomuser.me/api/portraits/men/1.jpg', timeOffset: 1.8 },
      { name: 'Дмитрий К.', rating: '4.8', price: 480, text: 'Могу быть завтра утром к 9:00. Даю гарантию на все виды работ 1 год. Работаю чисто и аккуратно.', avatar: 'https://randomuser.me/api/portraits/men/2.jpg', timeOffset: 2.5 },
      { name: 'Сергей М.', rating: '4.9', price: 600, text: 'Буду на месте через 30 минут, живу рядом. Помогу с выбором качественного ремкомплекта.', avatar: 'https://randomuser.me/api/portraits/men/3.jpg', timeOffset: 2.0 }
    ];
    specialists.forEach((spec, idx) => {
      setTimeout(() => {
        const nowTime = new Date();
        const timeStr = `${nowTime.getHours().toString().padStart(2,'0')}:${nowTime.getMinutes().toString().padStart(2,'0')}`;
        const specDiv = document.createElement('div');
        specDiv.className = 'flex gap-3 mb-6';
        specDiv.innerHTML = `
          <div class="flex-shrink-0 mt-auto"><div class="w-8 h-8 rounded-full overflow-hidden bg-gray-200"><img src="${spec.avatar}" class="w-full h-full object-cover"></div></div>
          <div class="flex-1 space-y-1"><div class="flex justify-between items-center px-1"><p class="text-metadata">${spec.name} • ${timeStr}</p><div class="flex items-center gap-1"><svg width="12" height="12" viewBox="0 0 24 24"><path d="M21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21C16.9706 21 21 16.9706 21 12Z M23 12C23 18.0751 18.0751 23 12 23C5.92487 23 1 18.0751 1 12C1 5.92487 5.92487 1 12 1C18.0751 1 23 5.92487 23 12Z" fill="currentColor"/><path d="M14.3692 9.22462C14.7619 8.90427 15.3409 8.92686 15.707 9.29298C16.0732 9.65909 16.0958 10.2381 15.7754 10.6309L15.707 10.707L11.707 14.707C11.3409 15.0732 10.7619 15.0958 10.3692 14.7754L10.293 14.707L8.29298 12.707L8.22462 12.6309C7.90427 12.2381 7.92686 11.6591 8.29298 11.293C8.65909 10.9269 9.2381 10.9043 9.63087 11.2246L9.70704 11.293L11 12.5859L14.293 9.29298L14.3692 9.22462Z" fill="currentColor"/></svg><span class="text-[10px] font-bold">Быстрый выезд</span></div></div><div class="bg-white border border-gray-100 p-4 rounded-2xl rounded-bl-md shadow-message"><p class="text-[14px] mb-4">${spec.text}</p><div class="pt-3 border-t border-gray-50 flex justify-between items-center"><span class="text-[12px] font-medium text-[#8F96A3]">⭐ ${spec.rating}</span><div class="px-3 py-1 bg-blue-50 rounded-full"><span class="text-[14px] font-bold text-blue-600">${spec.price} ₽</span></div></div></div></div>
        `;
        chatContainer.appendChild(specDiv);
        scrollToBottom();
        if(idx === specialists.length-1) {
          setTimeout(() => {
            const acceptBtnDiv = document.createElement('div');
            acceptBtnDiv.className = 'flex justify-center my-4';
            acceptBtnDiv.innerHTML = `<a href="../order-go/index.html" id="acceptBidBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition-all flex items-center gap-2"><iconify-icon icon="mdi:check-circle" width="20"></iconify-icon> Принять ставку 450 рублей</a>`;
            chatContainer.appendChild(acceptBtnDiv);
            scrollToBottom();
          }, 1200);
        }
      }, spec.timeOffset * 1000 + (idx === 0 ? 800 : 400));
    });
    currentSpecialistsAdded = true;
  }

  function initializeChatSequence() {
    if (chatContainer) {
      chatContainer.innerHTML = '';
    }
    addOrderInfoBlock();
    setTimeout(() => {
      addMessage('bot', 'Привет! Добро пожаловать в чат-аукцион по заявке #TP-2412. Ознакомься с данными по заявке и скажи когда ты сможешь прибыть на объект и какая у тебя цена?');
      addVoiceButton();
    }, 400);
  }

  // Запускаем инициализацию
  initializeChatSequence();

  // Добавляем слушатель на изменение размера контента
  if (scrollableContainer) {
    const observer = new MutationObserver(() => {
      scrollToBottom();
    });

    observer.observe(chatContainer, {
      childList: true,
      subtree: true,
      characterData: true
    });
  }
  // Для отладки - включите принудительную прокрутку на мобильных
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if (isMobile) {
    setInterval(() => {
      const container = document.getElementById('scrollableChatContainer');
      if (container && window.scrollY < container.scrollHeight) {
        container.scrollTop = container.scrollHeight;
      }
    }, 500); // Каждые 0.5 секунды проверяем и прокручиваем
  }
</script>
</body>
</html>
