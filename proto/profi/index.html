<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapToProfi Notification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" type="text/css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.011em;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: "Archivo", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .ios-glass {
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .safe-top {
      padding-top: env(safe-area-inset-top, 12px);
    }

    /* Custom shadow for the notification card */
    .notification-shadow {
      box-shadow: 0px 8px 32px 0px rgba(0, 0, 0, 0.12);
    }

    /* Desktop background styling */
    .desktop-bg {
      background: radial-gradient(circle at center, #f3f4f6 0%, #e5e7eb 100%);
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Main Container: Mobile-first, centered on desktop -->
  <main class="relative w-full h-screen sm:w-[390px] sm:h-[844px] sm:rounded-[48px] sm:shadow-2xl overflow-hidden bg-black flex flex-col">
    
    <!-- Background Image (iOS Home Screen) -->
    <div class="absolute inset-0 z-0">
      <img src="./assets/IMG_1.png" alt="Background" class="w-full h-full object-cover">
    </div>

    <!-- Status Bar Area (Visual only) -->
    <div class="relative z-20 w-full h-12 flex justify-between items-end px-8 pb-1 pointer-events-none">
      <div class="text-white text-[14px] font-semibold">9:41</div>
      <div class="flex gap-1.5 items-center">
        <iconify-icon icon="ic:baseline-signal-cellular-4-bar" class="text-white" width="18"></iconify-icon>
        <iconify-icon icon="ic:baseline-wifi" class="text-white" width="18"></iconify-icon>
        <iconify-icon icon="ic:baseline-battery-full" class="text-white" width="22"></iconify-icon>
      </div>
    </div>

    <!-- Notification Overlay Container -->
    <div class="relative z-30 w-full px-3 safe-top mt-2">
      
      <!-- iOS Notification Card -->
      <div class="ios-glass notification-shadow rounded-[24px] border border-white/40 p-4 flex flex-col gap-1 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] cursor-pointer">
        
        <!-- Header: App Info & Time -->
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2">
            <!-- App Icon -->
            <div class="w-5 h-5 bg-[#2563EB] rounded-[6px] flex items-center justify-center shadow-sm">
              <img data-type="ICON" class="w-3 h-3 text-white" data-icon="Lucide_bell_Outlined" src="./assets/IMG_2.svg" alt="Bell Icon">
            </div>
            <span class="text-[#8F96A3] text-[13px] font-medium tracking-[0.33px]">TapToProfi</span>
          </div>
          <span class="text-[#8F96A3] text-[12px]">Сейчас</span>
        </div>

        <!-- Content: Title, Description & Action -->
        <div class="flex justify-between items-start gap-4">
          <div class="flex flex-col gap-0.5">
            <h2 class="text-[#181B20] text-[15px] font-semibold leading-tight">Новый заказ</h2>
            <p class="text-[#181B20] text-[14px] leading-[18px] max-w-[220px]">
              Ремонт кухонного крана — ул. Ленина, 15
            </p>
          </div>
          
          <!-- Action Button -->
          <a href="spec-dash/index.html" class="bg-[#2563EB]/10 hover:bg-[#2563EB]/20 transition-colors px-4 py-1.5 rounded-full">
            <span class="text-[#2563EB] text-[14px] font-semibold">Открыть</span>
          </a>
        </div>

      </div>
    </div>

    <!-- Desktop Expansion: Sidebar/Context (Visible only on lg screens) -->
    <aside class="hidden lg:flex absolute left-full ml-12 top-12 flex-col gap-6 w-[320px]">
      <div class="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-white/50">
        <h3 class="text-xl mb-4 text-gray-800">Управление заказами</h3>
        <div class="space-y-4">
          <div class="flex items-center gap-4 p-3 bg-blue-50 rounded-2xl border border-blue-100">
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">
              <iconify-icon icon="ph:wrench-fill" width="20"></iconify-icon>
            </div>
            <div>
              <p class="text-sm font-semibold text-gray-900">Активный заказ</p>
              <p class="text-xs text-gray-500">В процессе выполнения</p>
            </div>
          </div>
          <div class="flex items-center gap-4 p-3 hover:bg-gray-50 rounded-2xl transition-colors cursor-pointer">
            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-600">
              <iconify-icon icon="ph:calendar-blank" width="20"></iconify-icon>
            </div>
            <div>
              <p class="text-sm font-semibold text-gray-900">История</p>
              <p class="text-xs text-gray-500">12 завершенных работ</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-white/50">
        <h3 class="text-lg mb-3 text-gray-800">Статистика</h3>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white p-3 rounded-xl shadow-sm">
            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">Рейтинг</p>
            <p class="text-xl font-bold text-yellow-500">4.9</p>
          </div>
          <div class="bg-white p-3 rounded-xl shadow-sm">
            <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">Доход</p>
            <p class="text-xl font-bold text-green-600">₽12к</p>
          </div>
        </div>
      </div>
    </aside>

    <!-- Bottom Indicator (iOS style) -->
    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/30 rounded-full z-20"></div>

  </main>

  <!-- Desktop Background Decoration -->
  <div class="fixed inset-0 -z-10 desktop-bg hidden sm:block"></div>

</body>
</html>
