    .lead {

      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      border-bottom: 1px solid #eaeaea;
      margin-bottom: 40px;

      letter-spacing: -0.02em;
      background: #111;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;

      display: flex;
      gap: 8px;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid #ccc;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #333;
    }
    .lang-btn.active {
      background: #111;
      border-color: #111;
      color: white;
    }

      display: inline-block;

      padding: 4px 12px;
      border-radius: 40px;
      font-weight: 500;
      letter-spacing: 0.01em;

      border-radius: 40px;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 12px;
      letter-spacing: 0.02em;

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .metric-card {
      background: #f9fafc;
      border-radius: 24px;
      padding: 28px 20px;
      border: 1px solid #eaeef2;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);

    .metric-number {
      font-size: 2.8rem;
      font-weight: 550;
      letter-spacing: -0.02em;
      color: #111;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .metric-label {
      color: #5f6b7a;
      font-size: 0.9rem;
      text-transform: uppercase;
      font-weight: 500;
    }

      border: none;
      border-top: 2px solid #eceef2;
      margin: 40px 0;
    }

      margin: 20px 0;
    }

      justify-content: space-between;
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .progress-bg {
      background: #e4e7ec;
      height: 8px;
      border-radius: 20px;
      width: 100%;
    }

    .progress-fill {
      background: #111;
      height: 8px;
      border-radius: 20px;
      width: 0%; /* will be set inline */
    }

    .blue-fill {
      background: #2563eb;
    }

    .competitor-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .competitor-table th {
      text-align: left;
      padding: 16px 8px 8px 0;
      font-weight: 600;
      border-bottom: 1px solid #ddd;
    }

    .competitor-table td {
      padding: 12px 8px 12px 0;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .competitor-table tr:last-child td {
      border-bottom: none;
    }

    .highlight {
      background: #f0f6ff;
      border-radius: 8px;
    }

    ul, ol {
      margin-left: 1.6rem;
      margin-bottom: 1.5rem;
      color: #2c2c2c;
    }

    li {
      margin-bottom: 6px;
    }

      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      align-items: flex-start;
    }

    .roadmap-marker {
      min-width: 100px;
      font-weight: 700;
      color: #2563eb;
    }

      background: #f9fafc;
      border-radius: 28px;
      padding: 32px;
      border: 1px solid #e2e8f0;
      margin-top: 20px;

      color: #777;
      font-size: 0.9rem;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #eceef2;
    }

      justify-content: space-between;

      margin: 36px 0;

      text-align: center;

      background: white;

      height: 64px;

      align-items: center;

      font-weight: 600;
      font-size: 0.85rem;

</head>

            <div style="background: #ffffff; border:1px solid #eee; border-radius:24px; padding:24px;">
              <span class="tag">${t.masterScenario}</span>
              <p style="margin-top:16px;">${t.masterDesc}</p>
            </div>
          </div>

          <!-- 5. AI-мультиагентная система (графика) -->
          <h2>${t.techTitle}</h2>
          <div class="agent-flow">
            <div class="agent-item"><div class="agent-icon">🔧</div><div class="agent-name">Classifier</div></div>
            <div class="agent-item"><div class="agent-icon">💬</div><div class="agent-name">Negotiator</div></div>
            <div class="agent-item"><div class="agent-icon">⭐</div><div class="agent-name">Reputation</div></div>
            <div class="agent-item"><div class="agent-icon">📅</div><div class="agent-name">Scheduler</div></div>
            <div class="agent-item"><div class="agent-icon">⚡</div><div class="agent-name">Auction</div></div>
          </div>
          <p>${t.techDesc}</p>

          <!-- 6. Юнит-экономика -->
          <h2>${t.econTitle}</h2>
          <p>${t.econSub}</p>
          <div class="grid-3" style="margin: 30px 0;">
            <div class="metric-card"><div class="metric-number">$25</div><div class="metric-label">${t.arpu}</div></div>
            <div class="metric-card"><div class="metric-number">12 mo</div><div class="metric-label">${t.lifetime}</div></div>
            <div class="metric-card"><div class="metric-number">$300</div><div class="metric-label">${t.ltv}</div></div>
            <div class="metric-card"><div class="metric-number">$100</div><div class="metric-label">${t.cac}</div></div>
            <div class="metric-card"><div class="metric-number">3x</div><div class="metric-label">${t.ltvCac}</div></div>
            <div class="metric-card"><div class="metric-number">4 mo</div><div class="metric-label">${t.payback}</div></div>
          </div>

          <p><strong>${t.scaleLabel}</strong></p>
          <div style="display: flex; flex-wrap: wrap; gap: 24px; background:#fafafa; border-radius: 28px; padding: 24px; margin: 20px 0;">
            <div><span style="font-weight:600;">${t.scale1}</span> → $2,5k MRR</div>
            <div><span style="font-weight:600;">${t.scale2}</span> → $25k MRR</div>
            <div><span style="font-weight:600;">${t.scale3}</span> → $250k MRR / $3M ARR</div>
            <div><span style="font-weight:600;">${t.scale4}</span> → $1,25M MRR / $15M ARR</div>
          </div>

          <!-- 7. Рынок и конкуренты -->
          <h2>${t.marketTitle}</h2>
          <p>${t.marketDesc}</p>
          <table class="competitor-table">
            <tr><th>${t.compTh1}</th><th>${t.compTh2}</th><th>${t.compTh3}</th></tr>
            <tr><td>${t.comp1[0]}</td><td>${t.comp1[1]}</td><td>${t.comp1[2]}</td></tr>
            <tr><td>${t.comp2[0]}</td><td>${t.comp2[1]}</td><td>${t.comp2[2]}</td></tr>
            <tr><td>${t.comp3[0]}</td><td>${t.comp3[1]}</td><td>${t.comp3[2]}</td></tr>
            <tr><td>${t.comp4[0]}</td><td>${t.comp4[1]}</td><td>${t.comp4[2]}</td></tr>
          </table>

          <!-- 8. Дорожная карта -->
          <h2>${t.roadmapTitle}</h2>
          <div class="roadmap-step"><div class="roadmap-marker">${t.step0}</div><div>${t.step0desc}</div></div>
          <div class="roadmap-step"><div class="roadmap-marker">${t.step1}</div><div>${t.step1desc}</div></div>
          <div class="roadmap-step"><div class="roadmap-marker">${t.step2}</div><div>${t.step2desc}</div></div>
          <div class="roadmap-step"><div class="roadmap-marker">${t.step3}</div><div>${t.step3desc}</div></div>

          <!-- 9. Команда -->
          <h2>${t.teamTitle}</h2>
          <ul>
            <li>${t.teamCeo}</li>
            <li>${t.teamCto}</li>
            <li>${t.teamAi}</li>
            <li>${t.teamProduct}</li>
            <li>${t.teamGrowth}</li>
          </ul>

          <!-- 10. Инвестиционное предложение -->
          <h2>${t.investTitle}</h2>
          <div class="investment-card">
            <p style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">${t.investAmount}</p>
            <p>${t.investTerm}</p>
            <div style="margin: 24px 0;">
              <div class="progress-label"><span>${t.investDev}</span> <span>30%</span></div><div class="progress-bg"><div class="progress-fill" style="width:30%"></div></div>
              <div class="progress-label"><span>${t.investSupply}</span> <span>40%</span></div><div class="progress-bg"><div class="progress-fill" style="width:40%"></div></div>
              <div class="progress-label"><span>${t.investDemand}</span> <span>20%</span></div><div class="progress-bg"><div class="progress-fill" style="width:20%"></div></div>
              <div class="progress-label"><span>${t.investLegal}</span> <span>10%</span></div><div class="progress-bg"><div class="progress-fill" style="width:10%"></div></div>
            </div>
            <p>${t.investReturn}</p>
            <p style="margin-top: 24px;">${t.contact}</p>
          </div>

          <div class="footnote">${t.footnote}</div>
        `;

        root.innerHTML = html;
      }

      // переключение языков
      document.addEventListener('DOMContentLoaded', () => {
        const ruBtn = document.getElementById('lang-ru');
        const enBtn = document.getElementById('lang-en');

        function setActiveLang(lang) {
          if (lang === 'ru') {
            ruBtn.classList.add('active');
            enBtn.classList.remove('active');
          } else {
            enBtn.classList.add('active');
            ruBtn.classList.remove('active');
          }
          currentLang = lang;
          render(lang);
        }

        ruBtn.addEventListener('click', () => setActiveLang('ru'));
        enBtn.addEventListener('click', () => setActiveLang('en'));

        // начальный рендер (русский)
        setActiveLang('ru');
      });
    })();
  </script>
</body>
</html>
